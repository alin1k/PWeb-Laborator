services:
  prometheus:
    image: prom/prometheus
    container_name: springwebapp-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped
  grafana:
    image: grafana/grafana
    container_name: springwebapp-grafana
    ports:
      - "3000:3000"
    restart: unless-stopped