spring:
  datasource:
    url: jdbc:mysql://localhost:3306/rest_lab_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: labuser
    password: labpass
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
logging:
  level:
    root: INFO
    ro:
      unitbv:
        springwebapp: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus"
  endpoint:
    health:
      show-details: always